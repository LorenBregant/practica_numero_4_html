<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InfoWeb - Contacto</title>
    <link rel="stylesheet" href="./css/index.css">

</head>
<body>
    <!-- Encabezado -->
    <header>
        <h1>InfoWeb</h1>
        <p>Contáctanos para más información</p>
    </header>

    <div class="container">
        <!-- Navegación / contenedor izquierdo -->
        <nav>
            <ul>
                <li><a href="./index.html">Inicio</a></li>
                <li><a href="./multimedia.html">Multimedia</a></li>
                <li><a href="#">Contacto</a></li>
            </ul>
        </nav>
        <!-- Contenido principal -->
        <main>
            <section>
                <form action="#" method="" target="_blank">
                    <table>
                        <tr>
                            <td><label for="nombre">Nombre:</label></td>
                            <td><input type="text" id="nombre" name="nombre" required></td>
                        </tr>
                        <tr>
                            <td><label for="email">Email:</label></td>
                            <td><input type="email" id="email" name="email" required></td>
                        </tr>
                        <tr>
                            <td><label for="edad">Edad:</label></td>
                            <td><input type="number" id="edad" name="edad"></td>
                        </tr>
                        <tr>
                            <td><label for="color_pref">Color preferido:</label></td>
                            <td><input type="color" id="color_pref" name="color_pref"></td>
                        </tr>
                        <tr>
                            <td><label for="comentario">Comentario:</label></td>
                            <td><textarea id="comentario" name="comentario" minlength="10"></textarea></td>
                        </tr>
                        <tr>
                            <td colspan="2" style="text-align: center;">
                                <button type="submit">Enviar</button>
                            </td>
                        </tr>
                    </table>
                </form>
            </section>
        </main>
        <!-- Contenedor secundario / derecho-->
        <div class="right">
            <h2>Contacto</h2>
            <p>¿Tienes alguna pregunta? Deja tu mensaje aquí.</p>
        </div>
    </div>
    <!-- Pie de página -->
    <footer>
        <p>&copy; 2026 InfoWeb. Todos los derechos reservados.</p>
    </footer>
</body>
</html>
